<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de tu Generacion — PhinodIA</title>
  <meta name="description" content="Consulta el estado de tu video, imagen o landing page generada con PhinodIA.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/static/images/favicon-32.png" sizes="32x32">
  <link rel="icon" href="/static/images/favicon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/style.css?v=1779000000">
</head>
<body>

  <a class="skip-link" href="#main">Saltar al contenido</a>

  <nav class="nav">
    <div class="nav-inner">
      <a href="https://phinodia.com/" class="nav-logo">
        <img src="https://ik.imagekit.io/nllhy6wch/Logo%20Google%20Workspace.png?updatedAt=1767905998676" alt="PhinodIA" width="53" height="22">
      </a>
      <div class="nav-links">
        <a href="/videos">Videos</a>
        <a href="/imagenes">Imagenes</a>
        <a href="/landing-pages">Landing Pages</a>
        <a href="/mis-generaciones">Mis Generaciones</a>
        <a href="/creditos">Mis Creditos</a>
        <a href="/referidos">Referidos</a>
        <a href="/precios" class="nav-cta">Precios</a>
      </div>
      <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    </div>
  </nav>

  <main id="main" class="container">
    <section class="hero" style="padding-bottom: 24px;">
      <h1>Estado de tu generacion.</h1>
      <p>Consulta el progreso de tu video, imagen o landing page.</p>
    </section>

    <div class="form-card" style="max-width: 500px; margin: 0 auto;">
      <div class="card">
        <div class="form-group" style="margin-bottom: 16px;">
          <label for="job-id-input">ID del trabajo</label>
          <input type="text" id="job-id-input" class="form-input" placeholder="Ej: a1b2c3d4-e5f6-7890-abcd-ef1234567890">
        </div>
        <button class="btn btn-primary btn-block" onclick="checkStatus()">Consultar estado</button>
      </div>

      <div id="status-result" class="hidden mt-24">
        <div class="status-card">
          <h3 id="status-title">Cargando...</h3>
          <p id="status-text" style="color: var(--text-secondary); margin: 8px 0 16px;"></p>
          <div class="progress-bar"><div class="progress-fill" id="status-progress" style="width: 0%"></div></div>
          <span class="status-badge" id="status-badge"></span>

          <div id="status-preview" class="hidden mt-24"></div>
          <div id="status-download" class="hidden mt-24">
            <a id="status-download-link" href="#" target="_blank" rel="noopener" class="btn btn-primary btn-lg">Descargar</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>2026 PhinodIA. Todos los derechos reservados.</p>
      <div class="footer-links">
        <a href="https://phinodia.com/politica-de-privacidad/" target="_blank" rel="noopener">Privacidad</a>
        <a href="https://phinodia.com/condiciones-del-servicio/" target="_blank" rel="noopener">Terminos</a>
        <a href="https://phinodia.com/habeas-data/" target="_blank" rel="noopener">Habeas Data</a>
      </div>
    </div>
  </footer>

  <script src="/static/js/api.js?v=1779000000"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('job_id')) {
      document.getElementById('job-id-input').value = params.get('job_id');
      checkStatus();
    }

    function checkStatus() {
      const jobId = document.getElementById('job-id-input').value.trim();
      if (!jobId) { showToast('Ingresa el ID del trabajo', 'error'); return; }

      document.getElementById('status-result').classList.remove('hidden');

      pollJobStatus(jobId, (status) => {
        const progress = document.getElementById('status-progress');
        const badge = document.getElementById('status-badge');
        const title = document.getElementById('status-title');
        const text = document.getElementById('status-text');

        progress.style.width = status.progress + '%';

        if (status.status === 'completed') {
          badge.className = 'status-badge completed'; badge.textContent = 'Completado';
          progress.style.width = '100%';
          if (!status.result_url) {
            // Defensive: completed flag but empty body — don't show "listo"
            // with nothing to download. Could be a data integrity gap.
            title.textContent = 'No se recibio el contenido';
            text.textContent = 'Hubo un problema con la generacion. Contactanos si pasa de 5 minutos sin resolverse.';
            return;
          }
          title.textContent = 'Tu contenido esta listo.';
          text.textContent = '';
          if (status.result_url) {
            const preview = document.getElementById('status-preview');
            preview.classList.remove('hidden');
            preview.innerHTML = '';
            const dl = document.getElementById('status-download');
            const link = document.getElementById('status-download-link');
            if (status.result_type === 'jpg') {
              if (!isSafeMediaUrl(status.result_url)) return;
              const img = document.createElement('img');
              img.src = status.result_url;
              img.alt = 'Resultado';
              img.style.cssText = 'max-width: 100%; border-radius: 12px;';
              preview.appendChild(img);
              link.href = status.result_url;
              link.textContent = 'Descargar imagen';
              link.onclick = null;
              dl.classList.remove('hidden');
            } else if (status.result_type === 'mp4') {
              if (!isSafeMediaUrl(status.result_url)) return;
              const video = document.createElement('video');
              video.src = status.result_url;
              video.controls = true;
              video.preload = 'metadata';
              video.playsInline = true;
              video.style.cssText = 'width: 100%; border-radius: 12px; background: #000;';
              preview.appendChild(video);
              link.href = status.result_url;
              link.textContent = 'Descargar video';
              link.onclick = null;
              dl.classList.remove('hidden');
            } else if (status.result_type === 'html') {
              const iframe = document.createElement('iframe');
              // Sandbox the landing-page preview: srcdoc inherits parent origin, so
              // any JS in the AI-generated HTML would otherwise run with our
              // privileges. Omitting allow-same-origin denies fetch/storage access;
              // omitting allow-popups-to-escape-sandbox denies window.open break-out.
              iframe.setAttribute('sandbox', '');
              iframe.srcdoc = status.result_url;
              iframe.style.cssText = 'width: 100%; height: 600px; border: 1px solid var(--border); border-radius: 12px; background: #fff;';
              preview.appendChild(iframe);
              link.textContent = 'Descargar HTML';
              link.href = '#';
              link.onclick = function(ev) {
                ev.preventDefault();
                const blob = new Blob([status.result_url], { type: 'text/html' });
                const u = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = u; a.download = 'landing-page.html'; a.click();
                URL.revokeObjectURL(u);
              };
              dl.classList.remove('hidden');
            }
          }
        } else if (status.status === 'failed') {
          badge.className = 'status-badge failed'; badge.textContent = 'Error';
          title.textContent = 'Hubo un error';
          // Cap message length so a 10MB error_message can't blow up the layout.
          text.textContent = (status.error_message || 'Intenta de nuevo.').slice(0, 500);
        } else if (status.status === 'error') {
          badge.className = 'status-badge failed'; badge.textContent = 'No encontrado';
          title.textContent = 'Trabajo no encontrado';
          text.textContent = (status.error_message || 'Verifica el ID e intenta de nuevo.').slice(0, 500);
        } else {
          badge.className = 'status-badge processing'; badge.textContent = 'Procesando';
          title.textContent = 'Generando tu contenido...';
          text.textContent = 'Esto puede tomar unos minutos.';
        }
      });
    }
  </script>
</body>
</html>
