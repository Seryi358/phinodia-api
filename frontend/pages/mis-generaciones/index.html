<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Generaciones — PhinodIA</title>
  <meta name="description" content="Consulta y descarga todos los videos, imagenes y landing pages que has generado en PhinodIA.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/static/images/favicon-32.png" sizes="32x32">
  <link rel="icon" href="/static/images/favicon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/style.css?v=1776380000">
  <style>
    .gen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:24px}
    .gen-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform var(--transition),box-shadow var(--transition)}
    .gen-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.06)}
    .gen-media{width:100%;aspect-ratio:1/1;background:#f5f5f7;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .gen-media img,.gen-media video{width:100%;height:100%;object-fit:cover}
    .gen-media-fallback{font-size:42px;color:var(--text-tertiary)}
    .gen-body{padding:16px 18px;display:flex;flex-direction:column;gap:8px;flex:1}
    .gen-type{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em}
    .gen-desc{font-size:14px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .gen-meta{font-size:12px;color:var(--text-secondary);margin-top:auto}
    .gen-actions{display:flex;gap:8px;padding:0 18px 18px}
    .gen-btn{flex:1;padding:8px 12px;border-radius:980px;font-size:13px;font-weight:500;text-decoration:none;text-align:center;transition:all var(--transition);cursor:pointer;border:none}
    .gen-btn-primary{background:var(--text);color:#fff}
    .gen-btn-primary:hover{opacity:0.85}
    .gen-btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
    .gen-btn-secondary:hover{background:var(--surface-2)}
    .gen-status{position:absolute;top:8px;right:8px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(0,0,0,0.65);color:#fff}
    .gen-status.completed{background:rgba(46,160,67,0.9)}
    .gen-status.failed{background:rgba(220,52,52,0.9)}
    .gen-status.processing{background:rgba(255,159,10,0.9)}
    .gen-empty{text-align:center;padding:48px 24px;color:var(--text-secondary)}
    .gen-empty p{margin-bottom:16px}
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <img src="https://ik.imagekit.io/nllhy6wch/Logo%20Google%20Workspace.png?updatedAt=1767905998676" alt="PhinodIA" height="22">
      </a>
      <div class="nav-links">
        <a href="/videos">Videos</a>
        <a href="/imagenes">Imagenes</a>
        <a href="/landing-pages">Landing Pages</a>
        <a href="/mis-generaciones" class="active">Mis Generaciones</a>
        <a href="/creditos">Mis Creditos</a>
        <a href="/referidos">Referidos</a>
        <a href="/precios" class="nav-cta">Precios</a>
      </div>
      <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    </div>
  </nav>

  <main class="container">
    <section class="hero" style="padding-bottom: 24px;">
      <h1>Mis generaciones.</h1>
      <p>Consulta y descarga todos los videos, imagenes y landing pages que has creado.</p>
    </section>

    <div class="form-card" style="max-width: 500px; margin: 0 auto;">
      <div id="search-card" class="card">
        <div class="form-group" style="margin-bottom: 16px;">
          <label for="gen-email">Tu correo electronico</label>
          <input type="email" id="gen-email" class="form-input" placeholder="tucorreo@ejemplo.com">
        </div>
        <button class="btn btn-primary btn-block" onclick="loadGenerations()">Ver mis generaciones</button>
      </div>
    </div>

    <div id="gen-results" class="hidden mt-32">
      <div id="gen-grid" class="gen-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>2026 PhinodIA. Todos los derechos reservados.</p>
      <div class="footer-links">
        <a href="https://phinodia.com/politica-de-privacidad/" target="_blank" rel="noopener">Privacidad</a>
        <a href="https://phinodia.com/condiciones-del-servicio/" target="_blank" rel="noopener">Terminos</a>
        <a href="https://phinodia.com/habeas-data/" target="_blank" rel="noopener">Habeas Data</a>
      </div>
    </div>
  </footer>

  <script src="/static/js/api.js?v=1776380000"></script>
  <script>
    const TYPE_LABELS = {
      video_8s: 'Video 8s', video_15s: 'Video 15s',
      video_22s: 'Video 22s', video_30s: 'Video 30s',
      image: 'Imagen', landing_page: 'Landing Page',
    };

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function fmtDate(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleDateString('es-CO', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
      } catch (e) { return iso; }
    }

    function fallbackLetter(rt) {
      return rt === 'mp4' ? 'V' : rt === 'jpg' ? 'I' : 'L';
    }

    function imgWithFallback(src, alt, rt) {
      const safeSrc = escapeHtml(src);
      const letter = fallbackLetter(rt);
      // onerror replaces broken image with a fallback letter (handles expired KIE URLs)
      return `<img src="${safeSrc}" alt="${escapeHtml(alt)}" loading="lazy" onerror="this.outerHTML='&lt;div class=&quot;gen-media-fallback&quot;&gt;${letter}&lt;/div&gt;'">`;
    }

    function renderMedia(job) {
      // Image: show the result directly with fallback
      if (job.status === 'completed' && job.result_type === 'jpg' && job.result_url) {
        return imgWithFallback(job.result_url, 'Imagen generada', 'jpg');
      }
      // Video: use input image as poster + play overlay
      if (job.result_type === 'mp4' && job.input_image_url) {
        const playOverlay = job.status === 'completed'
          ? '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);color:#fff;font-size:42px;font-weight:300;pointer-events:none;">&#9654;</div>'
          : '';
        return imgWithFallback(job.input_image_url, 'Video preview', 'mp4') + playOverlay;
      }
      // Landing page or anything else: input image fallback
      if (job.input_image_url) {
        return imgWithFallback(job.input_image_url, 'Insumo', job.result_type || 'html');
      }
      return `<div class="gen-media-fallback">${fallbackLetter(job.result_type)}</div>`;
    }

    function renderActions(job) {
      if (job.status !== 'completed') {
        return `<a class="gen-btn gen-btn-secondary" href="/estado/?job_id=${encodeURIComponent(job.job_id)}">Ver estado</a>`;
      }
      if (job.result_type === 'html') {
        return `<a class="gen-btn gen-btn-primary" href="${escapeHtml(job.result_url)}">Abrir landing</a>`;
      }
      const label = job.result_type === 'mp4' ? 'Descargar video' : 'Descargar';
      return `
        <a class="gen-btn gen-btn-primary" href="${escapeHtml(job.result_url)}" target="_blank" rel="noopener">${label}</a>
        <a class="gen-btn gen-btn-secondary" href="/estado/?job_id=${encodeURIComponent(job.job_id)}">Detalles</a>
      `;
    }

    function statusBadge(status) {
      const labels = {
        completed: 'Listo', failed: 'Error',
        processing: 'Generando', generating: 'Generando',
      };
      const cls = ['completed', 'failed'].includes(status) ? status : 'processing';
      // Escape unknown status values — defense if API ever returns unexpected text
      return `<span class="gen-status ${cls}">${escapeHtml(labels[status] || status || 'Desconocido')}</span>`;
    }

    async function loadGenerations() {
      const email = document.getElementById('gen-email').value.trim();
      if (!email || !isValidEmail(email)) {
        showToast('Ingresa un correo valido', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/jobs/by-email?email=${encodeURIComponent(email)}`);
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          showToast(data.detail || 'Error al consultar', 'error');
          return;
        }
        const jobs = await res.json();
        const grid = document.getElementById('gen-grid');
        document.getElementById('gen-results').classList.remove('hidden');

        if (!jobs.length) {
          grid.innerHTML = `
            <div class="gen-empty" style="grid-column: 1 / -1;">
              <p>Aun no has generado contenido con este correo.</p>
              <a href="/precios" class="btn btn-primary">Comprar creditos</a>
            </div>`;
          return;
        }

        // Persist email so user doesn't have to retype on refresh
        try { localStorage.setItem('phinodia_email', email); } catch (_) {}

        grid.innerHTML = jobs.map(job => `
          <div class="gen-card">
            <div class="gen-media">
              ${renderMedia(job)}
              ${statusBadge(job.status)}
            </div>
            <div class="gen-body">
              <div class="gen-type">${TYPE_LABELS[job.service_type] || job.service_type}</div>
              <div class="gen-desc">${escapeHtml(job.input_description || 'Sin descripcion')}</div>
              <div class="gen-meta">${fmtDate(job.completed_at || job.created_at)}</div>
            </div>
            <div class="gen-actions">${renderActions(job)}</div>
          </div>
        `).join('');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Auto-load if email is in URL or localStorage
    (function() {
      const params = new URLSearchParams(window.location.search);
      const urlEmail = params.get('email');
      let email = urlEmail;
      if (!email) {
        try { email = localStorage.getItem('phinodia_email'); } catch (_) {}
      }
      if (email && isValidEmail(email)) {
        document.getElementById('gen-email').value = email;
        loadGenerations();
      }
    })();
  </script>
</body>
</html>
