<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Creditos — PhinodIA</title>
  <meta name="description" content="Consulta tu balance de creditos en PhinodIA.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/static/images/favicon-32.png" sizes="32x32">
  <link rel="icon" href="/static/images/favicon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/style.css?v=1780000000">
</head>
<body>

  <a class="skip-link" href="#main">Saltar al contenido</a>

  <nav class="nav">
    <div class="nav-inner">
      <a href="https://phinodia.com/" class="nav-logo">
        <img src="https://ik.imagekit.io/nllhy6wch/Logo%20Google%20Workspace.png?updatedAt=1767905998676" alt="PhinodIA" width="53" height="22">
      </a>
      <div class="nav-links">
        <a href="/videos">Videos</a>
        <a href="/imagenes">Imagenes</a>
        <a href="/landing-pages">Landing Pages</a>
        <a href="/mis-generaciones">Mis Generaciones</a>
        <a href="/creditos" class="active">Mis Creditos</a>
        <a href="/referidos">Referidos</a>
        <a href="/precios" class="nav-cta">Precios</a>
      </div>
      <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    </div>
  </nav>

  <main id="main" class="container">
    <section class="hero" style="padding-bottom: 24px;">
      <h1>Mis creditos.</h1>
      <p>Consulta cuantos creditos tienes disponibles para generar contenido.</p>
    </section>

    <div class="form-card" style="max-width: 500px; margin: 0 auto;">
      <div class="card">
        <div class="form-group" style="margin-bottom: 16px;">
          <label for="credits-email">Tu correo electronico</label>
          <input type="email" id="credits-email" class="form-input" placeholder="tucorreo@ejemplo.com">
        </div>
        <button id="credits-submit" class="btn btn-primary btn-block" onclick="checkCredits()">Consultar creditos</button>
      </div>

      <div id="credits-result" class="hidden mt-24">
        <h3 style="text-align: center; margin-bottom: 20px;">Tu balance</h3>
        <div class="credits-grid" id="credits-grid"></div>
        <div class="text-center mt-24">
          <a href="/precios" class="btn btn-primary">Comprar mas creditos</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>2026 PhinodIA. Todos los derechos reservados.</p>
      <div class="footer-links">
        <a href="https://phinodia.com/politica-de-privacidad/" target="_blank" rel="noopener">Privacidad</a>
        <a href="https://phinodia.com/condiciones-del-servicio/" target="_blank" rel="noopener">Terminos</a>
        <a href="https://phinodia.com/habeas-data/" target="_blank" rel="noopener">Habeas Data</a>
      </div>
    </div>
  </footer>

  <script src="/static/js/api.js?v=1780300000"></script>
  <script defer src="/static/js/meta-pixel.js?v=1780300000"></script>
  <script>
    const LABELS = {
      video_8s: 'Videos 8s',
      video_15s: 'Videos 15s',
      video_22s: 'Videos 22s',
      video_30s: 'Videos 30s',
      image: 'Imagenes',
      landing_page: 'Landing Pages',
    };

    async function checkCredits() {
      const email = document.getElementById('credits-email').value.trim();
      if (!email || !isValidEmail(email)) {
        showToast('Ingresa un correo valido', 'error');
        return;
      }

      // Disable the button while in-flight so impatient users don't race-fire
      // 5 parallel requests and exhaust the 30/min/IP rate limit.
      setLoading('credits-submit', true);
      try {
        const balance = await getCredits(email);
        const grid = document.getElementById('credits-grid');
        grid.innerHTML = '';

        let total = 0;
        Object.entries(balance).forEach(([key, value]) => {
          total += value;
          const label = LABELS[key] || key;
          const extra = value > 0 ? ' style="background: var(--accent-subtle);"' : '';
          grid.innerHTML += '<div class="credit-item"' + extra + '><div class="credit-count">' + value + '</div><div class="credit-label">' + label + '</div></div>';
        });

        if (total === 0) {
          grid.innerHTML = '<div class="credit-item" style="grid-column: 1 / -1;"><div class="credit-count" style="color: var(--text-secondary);">0</div><div class="credit-label">No tienes creditos disponibles</div></div>';
        }

        document.getElementById('credits-result').classList.remove('hidden');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        setLoading('credits-submit', false);
      }
    }
  </script>
</body>
</html>
